name: Review on Pull Request
permissions:
  contents: read
  pull-requests: write
on:
  pull_request:

jobs:
  rust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - run: rustup toolchain install stable --profile minimal --no-self-update
      - uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7 # v2.85.0
        with:
          tool: clippy-sarif
      - uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1.5.0
        with:
          reviewdog_version: v0.21.0
      - name: Generate Clippy SARIF
        run: cargo clippy --message-format=json | clippy-sarif > clippy-results.sarif
      - name: Review Clippy results
        shell: sh
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ github.token }}
        run: reviewdog -f=sarif -name=clippy -reporter=github-pr-review < clippy-results.sarif
